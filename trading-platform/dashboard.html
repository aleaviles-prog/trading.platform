<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Trading Platform</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-left">
                <h2>TradingPro</h2>
            </div>
            <div class="header-right">
                <div class="balance-display">
                    Balance: $<span id="userBalance">10,000.00</span>
                </div>
                <button id="assetSelector" class="btn-secondary">
                    <span id="currentAsset">EUR/USD</span> ▼
                </button>
                <button id="accountMenuBtn" class="btn-icon">👤</button>
            </div>
        </header>

        <!-- Menú de cuenta (oculto por defecto) -->
        <div id="accountMenu" class="account-menu hidden">
            <div class="menu-item" onclick="showAccountInfo()">📊 Datos de Cuenta</div>
            <div class="menu-item" onclick="window.location.href='deposit.html'">💰 Depositar</div>
            <div class="menu-item" onclick="window.location.href='withdraw.html'">💸 Retirar</div>
            <div class="menu-item" onclick="showHistory()">📜 Historial</div>
            <div class="menu-item" onclick="logout()">🚪 Cerrar Sesión</div>
        </div>

        <!-- Selector de activos (oculto por defecto) -->
        <div id="assetModal" class="modal hidden">
            <div class="modal-content">
                <h3>Seleccionar Activo</h3>
                <div class="asset-list">
                    <div class="asset-category">
                        <h4>Forex</h4>
                        <div class="asset-item" onclick="selectAsset('EUR/USD')">EUR/USD</div>
                        <div class="asset-item" onclick="selectAsset('GBP/USD')">GBP/USD</div>
                        <div class="asset-item" onclick="selectAsset('USD/JPY')">USD/JPY</div>
                    </div>
                    <div class="asset-category">
                        <h4>Criptomonedas</h4>
                        <div class="asset-item" onclick="selectAsset('BTC/USD')">Bitcoin</div>
                        <div class="asset-item" onclick="selectAsset('ETH/USD')">Ethereum</div>
                    </div>
                    <div class="asset-category">
                        <h4>Índices</h4>
                        <div class="asset-item" onclick="selectAsset('US30')">US30</div>
                        <div class="asset-item" onclick="selectAsset('SP500')">S&P 500</div>
                    </div>
                </div>
                <button onclick="closeAssetModal()" class="btn-secondary">Cerrar</button>
            </div>
        </div>

        <div class="main-content">
            <!-- Gráfico -->
            <div class="chart-container">
                <div id="tradingview_chart"></div>
            </div>

            <!-- Panel de Trading -->
            <div class="trading-panel">
                <h3>Operar</h3>
                
                <!-- Precio actual -->
                <div class="price-display">
                    <div class="current-price">
                        <span class="price-label">Precio Actual</span>
                        <span id="currentPrice" class="price-value">1.0852</span>
                    </div>
                </div>

                <!-- Formulario de trading -->
                <div class="trade-form">
                    <div class="form-group">
                        <label>Volumen</label>
                        <input type="number" id="volume" value="1" min="0.01" step="0.01">
                    </div>

                    <div class="form-group">
                        <label>Stop Loss (Opcional)</label>
                        <input type="number" id="stopLoss" step="0.0001">
                    </div>

                    <div class="form-group">
                        <label>Take Profit (Opcional)</label>
                        <input type="number" id="takeProfit" step="0.0001">
                    </div>

                    <div class="trade-buttons">
                        <button onclick="executeTrade('buy')" class="btn-buy">COMPRAR</button>
                        <button onclick="executeTrade('sell')" class="btn-sell">VENDER</button>
                    </div>
                </div>

                <!-- Posiciones abiertas -->
                <div class="positions-section">
                    <h4>Posiciones Abiertas</h4>
                    <div id="openPositions" class="positions-list">
                        <!-- Las posiciones se cargarán aquí -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TradingView Widget -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <!-- Scripts propios -->
    <script src="js/config.js"></script>
    <script src="js/trading.js"></script>
</body>
</html>
