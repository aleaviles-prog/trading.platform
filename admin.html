<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Trading Platform</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="admin-dashboard">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <h2>Admin Panel</h2>
            </div>
            <nav class="admin-nav">
                <a href="#" class="nav-item active" onclick="showSection('overview')">
                    📊 Resumen
                </a>
                <a href="#" class="nav-item" onclick="showSection('users')">
                    👥 Usuarios
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <!-- Header -->
            <header class="admin-header">
                <h1>Panel de Control</h1>
                <button onclick="logout()" class="btn-logout">Cerrar Sesión</button>
            </header>

            <!-- Overview Section -->
            <section id="overview" class="admin-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Usuarios</h3>
                        <p class="stat-number" id="totalUsers">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Operaciones Totales</h3>
                        <p class="stat-number" id="totalTrades">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Balance Total</h3>
                        <p class="stat-number">$<span id="totalBalance">0</span></p>
                    </div>
                </div>
            </section>

            <!-- Users Section -->
            <section id="users" class="admin-section hidden">
                <h2>Gestión de Usuarios</h2>
                <div class="search-bar">
                    <input type="text" id="userSearch" placeholder="Buscar usuario...">
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Balance</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Los usuarios se cargarán aquí -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Firebase y Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <!-- Config PRIMERO -->
    <script src="js/config.js"></script>
    <!-- Admin DESPUÉS -->
    <script src="js/admin.js"></script>
</body>
</html>
